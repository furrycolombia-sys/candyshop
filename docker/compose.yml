services:
  app:
    container_name: ${SITE_PROD_CONTAINER_NAME:-candyshop-prod}
    image: ${SITE_PROD_IMAGE_NAME:-candyshop-local-prod}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        TARGET_ENV: ${TARGET_ENV:-staging}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_BUILD_HASH: ${NEXT_PUBLIC_BUILD_HASH:-}
        NEXT_PUBLIC_ENABLE_TEST_IDS: ${NEXT_PUBLIC_ENABLE_TEST_IDS:-}
        NEXT_PUBLIC_PROJECT_ID: ${NEXT_PUBLIC_PROJECT_ID:-}
        NEXT_PUBLIC_TENANT: ${NEXT_PUBLIC_TENANT:-}
        AUTH_PROVIDER_MODE: ${AUTH_PROVIDER_MODE:-}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
        SITE_PUBLIC_ORIGIN: ${SITE_PUBLIC_ORIGIN:-}
        BASE_PATH_PREFIX: ${BASE_PATH_PREFIX:-}
        NEXT_PUBLIC_LANDING_URL: ${NEXT_PUBLIC_LANDING_URL:-}
        NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-}
        NEXT_PUBLIC_PAYMENTS_URL: ${NEXT_PUBLIC_PAYMENTS_URL:-}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-}
        NEXT_PUBLIC_PLAYGROUND_URL: ${NEXT_PUBLIC_PLAYGROUND_URL:-}
        NEXT_PUBLIC_STUDIO_URL: ${NEXT_PUBLIC_STUDIO_URL:-}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-}
        NEXT_PUBLIC_AUTH_HOST_URL: ${NEXT_PUBLIC_AUTH_HOST_URL:-}
        SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID:-}
        SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET:-}
        SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID:-}
        SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET: ${SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET:-}
        CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    ports:
      - "${SITE_PROD_PORT:-8088}:80"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_BUILD_HASH: ${NEXT_PUBLIC_BUILD_HASH:-}
      NEXT_PUBLIC_ENABLE_TEST_IDS: ${NEXT_PUBLIC_ENABLE_TEST_IDS:-}
      NEXT_PUBLIC_PROJECT_ID: ${NEXT_PUBLIC_PROJECT_ID:-}
      NEXT_PUBLIC_TENANT: ${NEXT_PUBLIC_TENANT:-}
      AUTH_PROVIDER_MODE: ${AUTH_PROVIDER_MODE:-}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SITE_PUBLIC_ORIGIN: ${SITE_PUBLIC_ORIGIN:-}
      BASE_PATH_PREFIX: ${BASE_PATH_PREFIX:-}
      NEXT_PUBLIC_LANDING_URL: ${NEXT_PUBLIC_LANDING_URL:-}
      NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL:-}
      NEXT_PUBLIC_PAYMENTS_URL: ${NEXT_PUBLIC_PAYMENTS_URL:-}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-}
      NEXT_PUBLIC_PLAYGROUND_URL: ${NEXT_PUBLIC_PLAYGROUND_URL:-}
      NEXT_PUBLIC_STUDIO_URL: ${NEXT_PUBLIC_STUDIO_URL:-}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-}
      NEXT_PUBLIC_AUTH_HOST_URL: ${NEXT_PUBLIC_AUTH_HOST_URL:-}

  cloudflare:
    profiles: ["cloudflare"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${CLOUDFLARED_CONFIG_DIR:-~/.cloudflared}
        target: /etc/cloudflared
        read_only: true
    command: ["tunnel", "--config", "/etc/cloudflared/config.docker.yml", "--no-autoupdate", "run"]
