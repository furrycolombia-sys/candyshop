worker_processes auto;
pid /var/run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Only allow websocket upgrades (prevents h2c smuggling)
    map $http_upgrade $allowed_upgrade {
        default "";
        "websocket" "websocket";
    }

    map $http_upgrade $connection_upgrade {
        default "";
        "websocket" "upgrade";
    }

    # Forward the upstream proxy's protocol; fall back to nginx's own $scheme
    # when running without an upstream proxy (e.g. local Docker).
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Upstream for store app (port 3001) — main storefront
    upstream store_app {
        server 127.0.0.1:3001;
    }

    # Upstream for admin app (port 3002)
    upstream admin_app {
        server 127.0.0.1:3002;
    }

    # Upstream for auth app (port 3000)
    upstream auth_app {
        server 127.0.0.1:3000;
    }

    # Upstream for playground app (port 3003)
    upstream playground_app {
        server 127.0.0.1:3003;
    }

    server {
        listen 80;
        server_name _;

        # Admin app - routes starting with /admin
        location /admin {
            proxy_pass http://admin_app;
            # Mitigated: $allowed_upgrade map restricts to "websocket" only (see map block above)
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header Upgrade $allowed_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_cache_bypass $http_upgrade;
        }

        # Playground app - routes starting with /playground
        location /playground {
            proxy_pass http://playground_app;
            # Mitigated: $allowed_upgrade map restricts to "websocket" only (see map block above)
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header Upgrade $allowed_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_cache_bypass $http_upgrade;
        }

        # Auth app - routes starting with /auth
        location /auth {
            proxy_pass http://auth_app;
            # Mitigated: $allowed_upgrade map restricts to "websocket" only (see map block above)
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header Upgrade $allowed_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_cache_bypass $http_upgrade;
        }

        # Store app - all other routes (root / storefront)
        location / {
            proxy_pass http://store_app;
            # Mitigated: $allowed_upgrade map restricts to "websocket" only (see map block above)
            proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_set_header Upgrade $allowed_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint (exact match)
        location = /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
