# =============================================================================
# Staging compose — self-contained: Next.js app + full Supabase stack
# =============================================================================
# Used by: pnpm test:e2e --env staging  (when SUPABASE_MODE=docker)
#          pnpm staging                  (when SUPABASE_MODE=docker)
#
# All Supabase services run as explicit Docker containers so env vars are
# injected directly — no config.toml env() indirection, no CLI dependency.
#
# On first start the DB volume is empty, so the init script in
# docker/supabase/init/ runs automatically to apply migrations + seed.
#
# Required secrets (in .secrets, synced to GitHub Actions):
#   STAGING_JWT_SECRET          — HS256 JWT signing secret
#   STAGING_POSTGRES_PASSWORD   — Postgres superuser password
#   STAGING_SUPABASE_ANON_KEY   — anon JWT (signed with JWT_SECRET)
#   STAGING_SUPABASE_SERVICE_ROLE_KEY — service_role JWT
#   SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID
#   SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET
#
# To reset the DB to a clean state: docker volume rm candyshop-staging_db-data
# =============================================================================

name: candyshop-staging

services:

  # ── Next.js app ────────────────────────────────────────────────────────────
  app:
    container_name: ${SITE_PROD_CONTAINER_NAME:-candyshop-staging}
    image: ${SITE_PROD_IMAGE_NAME:-candyshop-staging}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        TARGET_ENV: staging
        NEXT_PUBLIC_BUILD_HASH: ${NEXT_PUBLIC_BUILD_HASH:-staging}
        NEXT_PUBLIC_ENABLE_TEST_IDS: ${NEXT_PUBLIC_ENABLE_TEST_IDS:-true}
        AUTH_PROVIDER_MODE: supabase
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        SITE_PUBLIC_ORIGIN: ${SITE_PUBLIC_ORIGIN}
        NEXT_PUBLIC_LANDING_URL: ${NEXT_PUBLIC_LANDING_URL}
        NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL}
        NEXT_PUBLIC_PAYMENTS_URL: ${NEXT_PUBLIC_PAYMENTS_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
        NEXT_PUBLIC_PLAYGROUND_URL: ${NEXT_PUBLIC_PLAYGROUND_URL}
        NEXT_PUBLIC_STUDIO_URL: ${NEXT_PUBLIC_STUDIO_URL}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
        NEXT_PUBLIC_AUTH_HOST_URL: ${NEXT_PUBLIC_AUTH_HOST_URL}
        SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID:-}
        SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET:-}
        SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID:-}
        SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET: ${SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET:-}
        CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    ports:
      - "${SITE_PROD_PORT:-8088}:80"
    depends_on:
      supabase-kong:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
    environment:
      # Server-side calls go through Kong inside the Docker network
      SUPABASE_URL_INTERNAL: http://supabase-kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AUTH_PROVIDER_MODE: supabase
      SITE_PUBLIC_ORIGIN: ${SITE_PUBLIC_ORIGIN}
      NEXT_PUBLIC_LANDING_URL: ${NEXT_PUBLIC_LANDING_URL}
      NEXT_PUBLIC_STORE_URL: ${NEXT_PUBLIC_STORE_URL}
      NEXT_PUBLIC_PAYMENTS_URL: ${NEXT_PUBLIC_PAYMENTS_URL}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
      NEXT_PUBLIC_PLAYGROUND_URL: ${NEXT_PUBLIC_PLAYGROUND_URL}
      NEXT_PUBLIC_STUDIO_URL: ${NEXT_PUBLIC_STUDIO_URL}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
      NEXT_PUBLIC_AUTH_HOST_URL: ${NEXT_PUBLIC_AUTH_HOST_URL}

  # ── Cloudflare tunnel — always active in staging ──────────────────────────
  cloudflare:
    container_name: supabase-staging-cloudflare
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${CLOUDFLARED_CONFIG_DIR:-~/.cloudflared}
        target: /etc/cloudflared
        read_only: true
    command: ["tunnel", "--config", "/etc/cloudflared/config.docker.yml", "--no-autoupdate", "run"]

  # ── Supabase: Postgres DB ──────────────────────────────────────────────────
  supabase-db:
    container_name: supabase-staging-db
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${STAGING_POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      # Do NOT set POSTGRES_USER — the image defaults to supabase_admin
      # which migrate.sh requires to bootstrap the schema.
      JWT_SECRET: ${STAGING_JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db-data:/var/lib/postgresql/data
      # These files run after migrate.sh (alphabetically after 'm').
      # They must be top-level .sql files — subdirectories are ignored by the
      # postgres entrypoint; migrate.sh handles its own internal subdirectories.
      #
      # zy- prefix = runs before zz- (alphabetical order matters)
      # zy-a runs before zy-b, etc.
      - ./supabase/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/zy-a-realtime.sql:ro
      - ./supabase/volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/zy-b-supabase-db.sql:ro
      - ./supabase/volumes/db/logs.sql:/docker-entrypoint-initdb.d/zy-c-logs.sql:ro
      - ./supabase/volumes/db/pooler.sql:/docker-entrypoint-initdb.d/zy-d-pooler.sql:ro
      # zz- prefix = runs last (after all zy- files)
      - ./supabase/volumes/db/roles.sql:/docker-entrypoint-initdb.d/zz-roles.sql:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  # ── Supabase: Auth (GoTrue) ────────────────────────────────────────────────
  supabase-auth:
    container_name: supabase-staging-auth
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    networks:
      default:
        aliases:
          - auth
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${STAGING_POSTGRES_PASSWORD}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: ${SUPABASE_AUTH_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${SUPABASE_AUTH_REDIRECT_URL_AUTH},${SUPABASE_AUTH_REDIRECT_URL_STORE},${SUPABASE_AUTH_REDIRECT_URL_ADMIN},${SUPABASE_AUTH_REDIRECT_URL_PAYMENTS},${SUPABASE_AUTH_REDIRECT_URL_PLAYGROUND},${SUPABASE_AUTH_REDIRECT_URL_LANDING},${SUPABASE_AUTH_REDIRECT_URL_STUDIO}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${STAGING_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: supabase-inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: Candyshop Staging
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"
      # Google OAuth
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SUPABASE_AUTH_EXTERNAL_REDIRECT_URI}
      GOTRUE_EXTERNAL_SKIP_NONCE_CHECK: "true"
      # Discord OAuth
      GOTRUE_EXTERNAL_DISCORD_ENABLED: "true"
      GOTRUE_EXTERNAL_DISCORD_CLIENT_ID: ${SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID}
      GOTRUE_EXTERNAL_DISCORD_SECRET: ${SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET}
      GOTRUE_EXTERNAL_DISCORD_REDIRECT_URI: ${SUPABASE_AUTH_EXTERNAL_REDIRECT_URI}

  # ── App migrations + seed (runs after auth schema is ready) ──────────────────
  db-migrations:
    container_name: supabase-staging-migrations
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      supabase-auth:
        condition: service_healthy
    volumes:
      - ../supabase/migrations:/supabase/migrations:ro
      - ../supabase/seed.sql:/supabase/seed.sql:ro
      - ./supabase/init/run-migrations.sh:/run-migrations.sh:ro
    entrypoint: ["/bin/sh", "/run-migrations.sh"]
    environment:
      PGPASSWORD: ${STAGING_POSTGRES_PASSWORD}
      PGHOST: supabase-db
      PGPORT: 5432
      PGUSER: supabase_admin
      PGDATABASE: postgres

  # ── Supabase: PostgREST ────────────────────────────────────────────────────
  supabase-rest:
    container_name: supabase-staging-rest
    image: postgrest/postgrest:v14.8
    restart: unless-stopped
    networks:
      default:
        aliases:
          - rest
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${STAGING_POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,graphql_public,audit
      PGRST_DB_MAX_ROWS: 1000
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${STAGING_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${STAGING_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: ["postgrest"]

  # ── Supabase: Realtime ─────────────────────────────────────────────────────
  supabase-realtime:
    container_name: realtime-dev.supabase-realtime
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sSfL --head -o /dev/null -H \"Authorization: Bearer ${NEXT_PUBLIC_SUPABASE_ANON_KEY}\" http://localhost:4000/api/tenants/realtime-dev/health"
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 10s
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${STAGING_JWT_SECRET}
      SECRET_KEY_BASE: ${STAGING_JWT_SECRET}
      METRICS_JWT_SECRET: ${STAGING_JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"

  # ── Supabase: Storage ──────────────────────────────────────────────────────
  supabase-storage:
    container_name: supabase-staging-storage
    image: supabase/storage-api:v1.48.26
    restart: unless-stopped
    networks:
      default:
        aliases:
          - storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
      start_period: 10s
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      supabase-imgproxy:
        condition: service_started
    environment:
      ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      AUTH_JWT_SECRET: ${STAGING_JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${STAGING_POSTGRES_PASSWORD}@supabase-db:5432/postgres
      STORAGE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL}/storage/v1
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      GLOBAL_S3_BUCKET: staging
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: staging
      REGION: local
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:5001
      S3_PROTOCOL_ACCESS_KEY_ID: ""
      S3_PROTOCOL_ACCESS_KEY_SECRET: ""
    volumes:
      - storage-data:/var/lib/storage

  # ── Supabase: Imgproxy ─────────────────────────────────────────────────────
  supabase-imgproxy:
    container_name: supabase-staging-imgproxy
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      timeout: 5s
      interval: 5s
      retries: 3
    volumes:
      - storage-data:/var/lib/storage
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: 16.8

  # ── Supabase: pg-meta ──────────────────────────────────────────────────────
  supabase-meta:
    container_name: supabase-staging-meta
    image: supabase/postgres-meta:v0.96.3
    restart: unless-stopped
    networks:
      default:
        aliases:
          - meta
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      CRYPTO_KEY: ${STAGING_JWT_SECRET}

  # ── Supabase: Analytics (Logflare) ─────────────────────────────────────────
  supabase-analytics:
    container_name: supabase-staging-analytics
    image: supabase/logflare:1.36.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "http://localhost:4000/health"]
      timeout: 5s
      interval: 5s
      retries: 10
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _supabase
      DB_HOSTNAME: supabase-db
      DB_PORT: 5432
      DB_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${STAGING_LOGFLARE_PUBLIC_ACCESS_TOKEN:-staging-logflare-token}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${STAGING_LOGFLARE_PRIVATE_ACCESS_TOKEN:-staging-logflare-private-token}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${STAGING_POSTGRES_PASSWORD}@supabase-db:5432/_supabase
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true

  # ── Supabase: Studio ───────────────────────────────────────────────────────
  supabase-studio:
    container_name: supabase-staging-studio
    image: supabase/studio:2026.04.08-sha-205cbe7
    restart: unless-stopped
    networks:
      default:
        aliases:
          - studio
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://localhost:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})\""
      timeout: 10s
      interval: 5s
      retries: 3
    depends_on:
      supabase-analytics:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PORT: 5432
      POSTGRES_HOST: supabase-db
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD}
      PG_META_CRYPTO_KEY: ${STAGING_JWT_SECRET}
      PGRST_DB_SCHEMAS: public,graphql_public,audit
      DEFAULT_ORGANIZATION_NAME: Candyshop Staging
      DEFAULT_PROJECT_NAME: candyshop-staging
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${STAGING_JWT_SECRET}
      LOGFLARE_PUBLIC_ACCESS_TOKEN: ${STAGING_LOGFLARE_PUBLIC_ACCESS_TOKEN:-staging-logflare-token}
      LOGFLARE_PRIVATE_ACCESS_TOKEN: ${STAGING_LOGFLARE_PRIVATE_ACCESS_TOKEN:-staging-logflare-private-token}
      LOGFLARE_URL: http://supabase-analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

  # ── Supabase: Kong API Gateway ─────────────────────────────────────────────
  supabase-kong:
    container_name: supabase-staging-kong
    image: kong/kong:3.9.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      supabase-realtime:
        condition: service_healthy
      supabase-storage:
        condition: service_healthy
    ports:
      - "${SUPABASE_KONG_HTTP_PORT:-54321}:8000/tcp"
    volumes:
      - ./supabase/volumes/api/kong.yml:/home/kong/temp.yml:ro
      - ./supabase/volumes/api/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_RESOLVER: 127.0.0.11
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: 0
      KONG_DNS_ERROR_TTL: 0
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction,post-function
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_PUBLISHABLE_KEY: ""
      SUPABASE_SECRET_KEY: ""
      ANON_KEY_ASYMMETRIC: ""
      SERVICE_ROLE_KEY_ASYMMETRIC: ""
      DASHBOARD_USERNAME: ${STAGING_SUPABASE_DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${STAGING_SUPABASE_DASHBOARD_PASSWORD:-supabase}
    entrypoint: /home/kong/kong-entrypoint.sh

  # ── Supabase: Inbucket (email testing) ────────────────────────────────────
  supabase-inbucket:
    container_name: supabase-staging-inbucket
    image: inbucket/inbucket:latest
    restart: unless-stopped
    # Not exposed on host — only GoTrue needs to reach it internally

volumes:
  db-data:
  storage-data:
