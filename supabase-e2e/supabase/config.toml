# E2E Testing Supabase Configuration
# ====================================
# This is a SEPARATE Supabase instance for e2e tests, running on port range
# 64321-64327 so it never collides with the dev instance (54321-54327).
#
# Migrations and seed are SYMLINKED from ../../supabase/:
#   supabase-e2e/supabase/migrations -> ../../supabase/migrations (junction)
#   supabase-e2e/supabase/seed.sql   -> ../../supabase/seed.sql   (hard link)
#
# Usage: pnpm supabase start --workdir supabase-e2e
#
# For the dev/prod config, see: supabase/config.toml
#
# Reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "candystore-e2e"

[api]
enabled = true
# E2E API port (dev uses 54321)
port = 64321
schemas = ["public", "graphql_public", "audit"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
# E2E DB port (dev uses 54322)
port = 64322
# E2E shadow port (dev uses 54320)
shadow_port = 64320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
# E2E pooler port (dev uses 54329)
port = 64329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = true

[studio]
enabled = true
# E2E Studio port (dev uses 54323)
port = 64323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
# E2E Inbucket port (dev uses 54324)
port = 64324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[storage.analytics]
enabled = false
max_namespaces = 5
max_tables = 10
max_catalogs = 2

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

[auth]
enabled = true
# Hardcoded to the e2e Docker container (no env vars needed)
site_url = "http://localhost:8089/auth/callback"
additional_redirect_urls = [
  "http://localhost:8089/auth/callback",
  "http://localhost:8089/store/auth/callback",
  "http://localhost:8089/admin/auth/callback",
  "http://localhost:8089/payments/auth/callback",
  "http://localhost:8089/playground/auth/callback",
  "http://localhost:8089/studio/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

# Google OAuth — same app as dev, but redirect to e2e Supabase port
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://localhost:64321/auth/v1/callback"
url = ""
skip_nonce_check = true
email_optional = false

# Discord — not needed for e2e tests
[auth.external.discord]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""
url = ""
skip_nonce_check = false
email_optional = false

[auth.web3.solana]
enabled = false

[auth.third_party.firebase]
enabled = false

[auth.third_party.auth0]
enabled = false

[auth.third_party.aws_cognito]
enabled = false

[auth.third_party.clerk]
enabled = false

[auth.oauth_server]
enabled = false
authorization_url_path = "/oauth/consent"
allow_dynamic_registration = false

[edge_runtime]
enabled = true
policy = "per_worker"
# E2E inspector port (dev uses 8083)
inspector_port = 8084
deno_version = 2

[analytics]
enabled = true
# E2E analytics port (dev uses 54327)
port = 64327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
