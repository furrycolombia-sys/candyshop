name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ============================================
  # Run CI checks before deploying
  # ============================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      - name: Build (validates env system works with prod secrets)
        run: pnpm run build
        env:
          CI: "true"
          TARGET_ENV: prod
          STANDALONE: "true"
          BASE_PATH_PREFIX: ""
          # Prod Supabase Cloud
          NEXT_PUBLIC_SUPABASE_URL: https://olafyajipvsltohagiah.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          # App URLs (prod)
          NEXT_PUBLIC_STORE_URL: https://store.furrycolombia.com/store
          NEXT_PUBLIC_ADMIN_URL: https://store.furrycolombia.com/admin
          NEXT_PUBLIC_AUTH_URL: https://store.furrycolombia.com/auth
          NEXT_PUBLIC_AUTH_HOST_URL: https://store.furrycolombia.com/auth
          NEXT_PUBLIC_LANDING_URL: https://store.furrycolombia.com
          NEXT_PUBLIC_PAYMENTS_URL: https://store.furrycolombia.com/payments
          NEXT_PUBLIC_PLAYGROUND_URL: https://store.furrycolombia.com/playground
          NEXT_PUBLIC_STUDIO_URL: https://store.furrycolombia.com/studio

  # ============================================
  # Deploy to production server via SSH
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci-gate
    environment: production
    env:
      SSH_OPTS: "-o StrictHostKeyChecking=no -o ProxyCommand='cloudflared access ssh --hostname %h'"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflared

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets.PROD_SERVER_HOST }}
            HostName ${{ secrets.PROD_SERVER_HOST }}
            User ${{ secrets.PROD_SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
            ServerAliveInterval 30
            ServerAliveCountMax 20
          EOF

      - name: Write ephemeral env file on server
        run: |
          ssh ${{ secrets.PROD_SERVER_HOST }} \
            'cat > /tmp/.candyshop-build.env << ENVEOF
          CI=true
          TARGET_ENV=prod
          STANDALONE=true
          BASE_PATH_PREFIX=
          NEXT_PUBLIC_SUPABASE_URL=https://olafyajipvsltohagiah.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_STORE_URL=https://store.furrycolombia.com/store
          NEXT_PUBLIC_ADMIN_URL=https://store.furrycolombia.com/admin
          NEXT_PUBLIC_AUTH_URL=https://store.furrycolombia.com/auth
          NEXT_PUBLIC_AUTH_HOST_URL=https://store.furrycolombia.com/auth
          NEXT_PUBLIC_LANDING_URL=https://store.furrycolombia.com
          NEXT_PUBLIC_PAYMENTS_URL=https://store.furrycolombia.com/payments
          NEXT_PUBLIC_PLAYGROUND_URL=https://store.furrycolombia.com/playground
          NEXT_PUBLIC_STUDIO_URL=https://store.furrycolombia.com/studio
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID=${{ secrets.TELEGRAM_THREAD_ID }}
          ENVEOF'

      - name: Copy deploy script to server
        run: |
          cat scripts/deploy-production.sh | ssh ${{ secrets.PROD_SERVER_HOST }} \
            'cat > /tmp/deploy-production.sh && chmod +x /tmp/deploy-production.sh'

      - name: Run deployment
        run: |
          ssh ${{ secrets.PROD_SERVER_HOST }} \
            "REPO_URL='https://github.com/${{ github.repository }}.git' \
             BRANCH='${{ github.ref_name }}' \
             ENV_FILE='/tmp/.candyshop-build.env' \
             bash /tmp/deploy-production.sh"

      - name: Verify deployment
        run: |
          ssh ${{ secrets.PROD_SERVER_HOST }} \
            'docker ps --filter name=candyshop-prod --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'

      - name: Cleanup
        if: always()
        run: |
          ssh ${{ secrets.PROD_SERVER_HOST }} \
            'rm -f /tmp/.candyshop-build.env /tmp/deploy-production.sh' 2>/dev/null || true
          rm -f ~/.ssh/deploy_key
