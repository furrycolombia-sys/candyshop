name: Notify Bug Issue

on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  notify:
    name: Send Telegram Alert
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event.label.name == 'bug'
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_REVIEWS_THREAD_ID }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          python3 - <<'EOF'
          import html, json, os, urllib.error, urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              raise SystemExit("Missing required secret: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID")

          text = (
              "🐛 <b>New Bug Report</b>\n\n"
              f"<b>#{os.environ['ISSUE_NUMBER']}</b>: {html.escape(os.environ['ISSUE_TITLE'])}\n"
              f"👤 {html.escape(os.environ['ISSUE_AUTHOR'])}\n\n"
              f"🔗 {html.escape(os.environ['ISSUE_URL'])}"
          )

          payload = {
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "HTML",
          }
          thread_id = os.environ.get("TELEGRAM_THREAD_ID", "").strip()
          if thread_id:
              try:
                  payload["message_thread_id"] = int(thread_id)
              except ValueError:
                  print(f"Warning: invalid TELEGRAM_THREAD_ID={thread_id!r}, sending without thread")

          data = json.dumps(payload).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print(f"Notification sent: {resp.read().decode()}")
          except urllib.error.HTTPError as e:
              print(f"Telegram API error {e.code}: {e.read().decode('utf-8', errors='replace')}")
              raise
          except urllib.error.URLError as e:
              print(f"Network error reaching Telegram: {e.reason}")
              raise
          EOF
