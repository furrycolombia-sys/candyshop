name: CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ============================================
  # Detect Changes (skip CI for docs-only PRs)
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      store: ${{ steps.filter.outputs.store }}
      studio: ${{ steps.filter.outputs.studio }}
      admin: ${{ steps.filter.outputs.admin }}
      landing: ${{ steps.filter.outputs.landing }}
      payments: ${{ steps.filter.outputs.payments }}
      auth: ${{ steps.filter.outputs.auth }}
      playground: ${{ steps.filter.outputs.playground }}
      packages: ${{ steps.filter.outputs.packages }}
      tooling: ${{ steps.filter.outputs.tooling }}
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            store:
              - 'apps/store/**'
            studio:
              - 'apps/studio/**'
            admin:
              - 'apps/admin/**'
            auth:
              - 'apps/auth/**'
            landing:
              - 'apps/landing/**'
            payments:
              - 'apps/payments/**'
            playground:
              - 'apps/playground/**'
            packages:
              - 'packages/**'
            tooling:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'prettier.config.*'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'prettier.config.*'
      - name: Check if docs-only
        id: check
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
            echo "docs-only=true" >> $GITHUB_OUTPUT
            echo "Docs-only PR detected - skipping full CI"
          else
            echo "docs-only=false" >> $GITHUB_OUTPUT
            echo "Code changes detected - running full CI"
          fi

  # ============================================
  # Quality Checks (skip for docs-only PRs)
  # ============================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs-only == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Check app registry
        run: bash scripts/check-app-registry.sh

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          LINT_TARGETS=$(echo "$SELECT_OUTPUT" | grep '^LINT_TARGETS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full lint because packages/tooling changed."
            pnpm run lint
            exit 0
          fi

          if [ -z "$LINT_TARGETS" ]; then
            echo "No lintable workspace changes detected. Skipping lint."
            exit 0
          fi

          echo "Running scoped lint for:$LINT_TARGETS"
          pnpm exec eslint $LINT_TARGETS

      - name: Type check (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full typecheck because packages/tooling changed."
            pnpm run typecheck
            exit 0
          fi

          [ -z "$APPS" ] && echo "No workspace apps selected for typecheck." && exit 0
          for APP in $APPS; do
            pnpm --filter "$APP" typecheck
          done

      - name: Monorepo checks
        if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        run: |
          pnpm run sherif
          pnpm run syncpack:lint

  # ============================================
  # Unit Tests (Vitest) - All Apps
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.docs-only == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Run unit tests (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full coverage because packages/tooling changed."
            pnpm run test:coverage
            exit 0
          fi

          [ -z "$APPS" ] && echo "No workspace apps selected for unit tests." && exit 0
          for APP in $APPS; do
            pnpm --filter "$APP" test:coverage
          done

      - name: Upload store coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.store == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-store
          path: apps/store/coverage/
          retention-days: 7

      - name: Upload admin coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-admin
          path: apps/admin/coverage/
          retention-days: 7

      - name: Upload auth coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-auth
          path: apps/auth/coverage/
          retention-days: 7

      - name: Upload landing coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.landing == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-landing
          path: apps/landing/coverage/
          retention-days: 7

      - name: Upload payments coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.payments == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-payments
          path: apps/payments/coverage/
          retention-days: 7

  # ============================================
  # Build
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.docs-only == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Load CI environment
        run: |
          grep -v '^\s*#' .env.ci | grep -v '^\s*$' | grep -v '\$secret:' | while IFS= read -r line; do
            echo "$line" >> "$GITHUB_ENV"
          done

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/*/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/**/*.ts', 'apps/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build applications (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full build because packages/tooling changed."
            pnpm run build
            exit 0
          fi

          [ -z "$APPS" ] && echo "No workspace apps selected for build." && exit 0
          for APP in $APPS; do
            pnpm --filter "$APP" build
          done
        env:
          CI: "true"
          NEXT_PUBLIC_API_BASE_URL: /api
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET }}

      - name: Upload store build artifacts
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.store == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-store
          path: apps/store/.next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload admin build artifacts
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-admin
          path: apps/admin/.next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload auth build artifacts
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-auth
          path: apps/auth/.next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload landing build artifacts
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.landing == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-landing
          path: apps/landing/.next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload payments build artifacts
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.payments == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-payments
          path: apps/payments/.next/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  # ============================================
  # E2E Tests (Playwright)
  # ============================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build, changes]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Load CI environment
        run: |
          grep -v '^\s*#' .env.ci | grep -v '^\s*$' | grep -v '\$secret:' | while IFS= read -r line; do
            echo "$line" >> "$GITHUB_ENV"
          done

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter store list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter store exec playwright install --with-deps chromium

      - name: Install Playwright dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter store exec playwright install-deps chromium

      - name: Download store build artifacts
        uses: actions/download-artifact@v4
        if: needs.changes.outputs.store == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-store
          path: apps/store/.next/

      - name: Download admin build artifacts
        uses: actions/download-artifact@v4
        if: needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-admin
          path: apps/admin/.next/

      - name: Download auth build artifacts
        uses: actions/download-artifact@v4
        if: needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-auth
          path: apps/auth/.next/

      - name: Download landing build artifacts
        uses: actions/download-artifact@v4
        if: needs.changes.outputs.landing == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-landing
          path: apps/landing/.next/

      - name: Download payments build artifacts
        uses: actions/download-artifact@v4
        if: needs.changes.outputs.payments == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        with:
          name: build-payments
          path: apps/payments/.next/

      - name: Start app servers
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
        run: |
          start_if_built() {
            local app="$1" dir="$2"
            if [ -d "apps/${dir}/.next/server" ]; then
              echo "Starting ${app}..."
              pnpm --filter "${app}" start > /tmp/log-${app}.log 2>&1 &
            fi
          }
          start_if_built store    store
          start_if_built admin    admin
          start_if_built landing  landing
          start_if_built payments payments
          start_if_built auth-app auth
          echo "App servers started in background."

      - name: Wait for app servers to be ready
        run: |
          wait_for() {
            local url="$1" name="$2"
            echo -n "Waiting for ${name} at ${url}..."
            for i in $(seq 1 30); do
              # -s silent, -o discard body, no -f so any HTTP response (incl. redirects) counts as "up"
              curl -s -o /dev/null "${url}" 2>/dev/null && echo " ready." && return 0
              sleep 2
            done
            echo " TIMED OUT"
            cat "/tmp/log-${name}.log" 2>/dev/null || true
            exit 1
          }
          [ -d "apps/store/.next/server" ]    && wait_for "http://localhost:5001" store
          [ -d "apps/admin/.next/server" ]    && wait_for "http://localhost:5002" admin
          [ -d "apps/landing/.next/server" ]  && wait_for "http://localhost:5004" landing
          [ -d "apps/payments/.next/server" ] && wait_for "http://localhost:5005" payments
          [ -d "apps/auth/.next/server" ]     && wait_for "http://localhost:5000" auth-app
          echo "All servers ready."

      - name: Run E2E tests (scoped)
        env:
          DEV_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          DEV_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          DEV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
          GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)
          [ -z "$APPS" ] && echo "No workspace apps selected for E2E tests." && exit 0
          for APP in $APPS; do
            echo "Running E2E for ${APP}"
            pnpm --filter "${APP}" test:e2e
          done

      - name: Upload store Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.store == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-store
          path: apps/store/playwright-report/
          retention-days: 7

      - name: Upload admin Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-admin
          path: apps/admin/playwright-report/
          retention-days: 7

      - name: Upload auth Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-auth
          path: apps/auth/playwright-report/
          retention-days: 7

      - name: Upload landing Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.landing == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-landing
          path: apps/landing/playwright-report/
          retention-days: 7

      - name: Upload payments Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.payments == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-payments
          path: apps/payments/playwright-report/
          retention-days: 7

  # ============================================
  # Bundle Analysis
  # ============================================
  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs-only == 'false' && github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Analyze store bundle
        run: cd apps/store && ANALYZE=true pnpm run build || true

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-analysis
          path: apps/store/.next/analyze/
          retention-days: 7
