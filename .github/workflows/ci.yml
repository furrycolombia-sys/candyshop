name: CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ============================================
  # Detect Changes (skip CI for docs-only PRs)
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      store: ${{ steps.filter.outputs.store }}
      studio: ${{ steps.filter.outputs.studio }}
      admin: ${{ steps.filter.outputs.admin }}
      landing: ${{ steps.filter.outputs.landing }}
      payments: ${{ steps.filter.outputs.payments }}
      auth: ${{ steps.filter.outputs.auth }}
      playground: ${{ steps.filter.outputs.playground }}
      packages: ${{ steps.filter.outputs.packages }}
      tooling: ${{ steps.filter.outputs.tooling }}
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            store:
              - 'apps/store/**'
            studio:
              - 'apps/studio/**'
            admin:
              - 'apps/admin/**'
            auth:
              - 'apps/auth/**'
            landing:
              - 'apps/landing/**'
            payments:
              - 'apps/payments/**'
            playground:
              - 'apps/playground/**'
            packages:
              - 'packages/**'
            tooling:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'prettier.config.*'
            code:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'prettier.config.*'
      - name: Check if docs-only
        id: check
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
            echo "docs-only=true" >> $GITHUB_OUTPUT
            echo "Docs-only PR detected - skipping full CI"
          else
            echo "docs-only=false" >> $GITHUB_OUTPUT
            echo "Code changes detected - running full CI"
          fi

  # ============================================
  # Quality Checks (skip for docs-only PRs)
  # ============================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs-only == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Check app registry
        run: bash scripts/check-app-registry.sh

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          LINT_TARGETS=$(echo "$SELECT_OUTPUT" | grep '^LINT_TARGETS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full lint because packages/tooling changed."
            pnpm run lint
            exit 0
          fi

          if [ -z "$LINT_TARGETS" ]; then
            echo "No lintable workspace changes detected. Skipping lint."
            exit 0
          fi

          echo "Running scoped lint for:$LINT_TARGETS"
          pnpm exec eslint $LINT_TARGETS

      - name: Type check (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full typecheck because packages/tooling changed."
            pnpm run typecheck
            exit 0
          fi

          [ -z "$APPS" ] && echo "No workspace apps selected for typecheck." && exit 0
          for APP in $APPS; do
            pnpm --filter "$APP" typecheck
          done

      - name: Monorepo checks
        if: needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true'
        run: |
          pnpm run sherif
          pnpm run syncpack:lint

  # ============================================
  # Unit Tests (Vitest) - All Apps
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.docs-only == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Run unit tests (scoped)
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          RUN_ALL=$(echo "$SELECT_OUTPUT" | grep '^RUN_ALL=' | cut -d= -f2-)
          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)

          if [ "$RUN_ALL" = "true" ]; then
            echo "Running full coverage because packages/tooling changed."
            pnpm run test:coverage
            exit 0
          fi

          [ -z "$APPS" ] && echo "No workspace apps selected for unit tests." && exit 0
          for APP in $APPS; do
            pnpm --filter "$APP" test:coverage
          done

      - name: Upload store coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.store == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-store
          path: apps/store/coverage/
          retention-days: 7

      - name: Upload admin coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-admin
          path: apps/admin/coverage/
          retention-days: 7

      - name: Upload auth coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-auth
          path: apps/auth/coverage/
          retention-days: 7

      - name: Upload landing coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.landing == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-landing
          path: apps/landing/coverage/
          retention-days: 7

      - name: Upload payments coverage report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.payments == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: coverage-report-payments
          path: apps/payments/coverage/
          retention-days: 7

  # ============================================
  # Docker Build — single image for E2E
  # ============================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.docs-only == 'false'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_AUTH_URL=http://localhost:5050/auth
            NEXT_PUBLIC_AUTH_HOST_URL=http://localhost:5050/auth
            NEXT_PUBLIC_STORE_URL=http://localhost:5050/store
            NEXT_PUBLIC_ADMIN_URL=http://localhost:5050/admin
            NEXT_PUBLIC_PLAYGROUND_URL=http://localhost:5050/playground
            NEXT_PUBLIC_LANDING_URL=http://localhost:5050
            NEXT_PUBLIC_PAYMENTS_URL=http://localhost:5050/payments
            NEXT_PUBLIC_STUDIO_URL=http://localhost:5050/studio
            NEXT_PUBLIC_BUILD_HASH=ci
            NEXT_PUBLIC_ENABLE_TEST_IDS=true

  # ============================================
  # E2E Tests (Playwright)
  # ============================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [changes, docker-build]
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and tag pre-built app image
        run: |
          docker pull ${{ needs.docker-build.outputs.image }}
          docker tag ${{ needs.docker-build.outputs.image }} candyshop-ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter auth-app list @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter auth-app exec playwright install --with-deps chromium

      - name: Install Playwright dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter auth-app exec playwright install-deps chromium

      - name: Run E2E tests (scoped)
        env:
          # Secret names match the $secret: references in .env.ci exactly.
          # load-env.mjs sees CI=true and resolves $secret:KEY → process.env[KEY].
          # Topology (APPS_MODE, SUPABASE_MODE, HOST_PORT, URLs) comes from .env.ci.
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          STAGING_JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          STAGING_POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET }}
          TALLY_FORM_ID: ${{ secrets.TALLY_FORM_ID }}
          GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
          GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
        run: |
          set -euo pipefail

          SELECT_OUTPUT=$(bash scripts/select-workspaces.sh \
            "${{ needs.changes.outputs.store }}" \
            "${{ needs.changes.outputs.landing }}" \
            "${{ needs.changes.outputs.payments }}" \
            "${{ needs.changes.outputs.admin }}" \
            "${{ needs.changes.outputs.auth }}" \
            "${{ needs.changes.outputs.playground }}" \
            "${{ needs.changes.outputs.packages }}" \
            "${{ needs.changes.outputs.tooling }}" \
            "${{ needs.changes.outputs.studio }}")

          APPS=$(echo "$SELECT_OUTPUT" | grep '^APPS=' | cut -d= -f2-)
          [ -z "$APPS" ] && echo "No workspace apps selected for E2E tests." && exit 0

          for APP in $APPS; do
            # Map pnpm filter name → scripts/e2e.mjs --app value.
            # e2e.mjs starts Supabase + Docker container and runs Playwright,
            # all driven by the env vars loaded from .env.ci.
            case "$APP" in
              auth-app) E2E_APP="auth"  ;;
              store)    E2E_APP="store" ;;
              admin)    E2E_APP="admin" ;;
              *)        echo "No E2E suite for ${APP}, skipping."; continue ;;
            esac
            echo "Running E2E for ${E2E_APP} (env=ci)"
            node scripts/e2e.mjs --env ci --app "${E2E_APP}"
          done

      - name: Upload store Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.store == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-store
          path: apps/store/playwright-report/
          retention-days: 7

      - name: Upload admin Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-admin
          path: apps/admin/playwright-report/
          retention-days: 7

      - name: Upload auth Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.auth == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-auth
          path: apps/auth/playwright-report/
          retention-days: 7

      - name: Upload landing Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.landing == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-landing
          path: apps/landing/playwright-report/
          retention-days: 7

      - name: Upload payments Playwright report
        uses: actions/upload-artifact@v4
        if: always() && (needs.changes.outputs.payments == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.tooling == 'true')
        with:
          name: playwright-report-payments
          path: apps/payments/playwright-report/
          retention-days: 7

  # ============================================
  # Bundle Analysis
  # ============================================
  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs-only == 'false' && github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile || {
            echo "Frozen lockfile install failed, retrying without frozen lockfile"
            pnpm install --no-frozen-lockfile
          }

      - name: Analyze store bundle
        run: cd apps/store && ANALYZE=true pnpm run build || true

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-analysis
          path: apps/store/.next/analyze/
          retention-days: 7
